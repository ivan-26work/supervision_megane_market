    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function() {
            const SUPABASE_URL = 'https://emcsigvlopntwbfkkjkh.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtY3NpZ3Zsb3BudHdiZmtramtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4ODE5MTgsImV4cCI6MjA5NDQ1NzkxOH0.YwYoV-azL3WEFtHoh4yoF7xTLrOwZILKCzJrGPsCs6I';

            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            let allProducts = [];
            let allMarkets = [];
            let searchHistory = [];
            let carouselIntervals = {};

            const STORAGE_KEY = 'megane_search_history';
            const initialState = document.getElementById('initialState');
            const loadingState = document.getElementById('loadingState');
            const resultsContainer = document.getElementById('resultsContainer');
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');

            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function formatPrice(price) {
                return new Intl.NumberFormat('fr-FR').format(price);
            }

            async function recordCardClick(productId, type = 'card') {
                try {
                    await supabase
                        .from('product_stats')
                        .insert({
                            product_id: productId,
                            click_count: 1,
                            click_type: type,
                            clicked_at: new Date().toISOString()
                        });
                    console.log('Clic enregistré:', productId, '(type:', type + ')');
                } catch (err) {
                    console.error('Erreur enregistrement:', err);
                }
            }

            function loadHistory() {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) searchHistory = JSON.parse(saved);
                renderHistory();
            }

            function saveHistory() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(searchHistory));
            }

            function addToHistory(query) {
                if (!query.trim()) return;
                searchHistory = searchHistory.filter(h => h !== query);
                searchHistory.unshift(query);
                if (searchHistory.length > 10) searchHistory.pop();
                saveHistory();
                renderHistory();
            }

            function renderHistory() {
                const historyBar = document.getElementById('historyBar');
                const historyList = document.getElementById('historyList');
                
                if (searchHistory.length === 0) {
                    historyBar.style.display = 'none';
                    return;
                }
                
                historyBar.style.display = 'block';
                historyList.innerHTML = searchHistory.map(term => `
                    <button class="history-chip" data-term="${escapeHtml(term)}">${escapeHtml(term)}</button>
                `).join('');
                
                document.querySelectorAll('.history-chip').forEach(chip => {
                    chip.addEventListener('click', () => {
                        const term = chip.getAttribute('data-term');
                        searchInput.value = term;
                        performSearch(term);
                    });
                });
            }

            async function loadProducts() {
                try {
                    const { data: activeMarkets } = await supabase
                        .from('markets')
                        .select('id')
                        .eq('market_active', true);
                    
                    const activeMarketIds = (activeMarkets || []).map(m => m.id);
                    
                    if (activeMarketIds.length === 0) {
                        allProducts = [];
                        return;
                    }
                    
                    const { data: products } = await supabase
                        .from('products')
                        .select('*')
                        .eq('active', true)
                        .in('user_id', activeMarketIds);
                    
                    allProducts = products || [];
                } catch (err) {
                    console.error('Erreur chargement produits:', err);
                }
            }

            async function loadMarkets() {
                const { data } = await supabase
                    .from('markets')
                    .select('id, market_name, owner_name');
                allMarkets = data || [];
            }

            function getMarketName(marketId) {
                const market = allMarkets.find(m => m.id === marketId);
                return market?.market_name || market?.owner_name || 'Vendeur';
            }

            function tokenizeQuery(query) {
                const words = query.toLowerCase()
                    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                    .split(/\s+/)
                    .filter(w => w.length > 1);
                
                const expanded = [];
                for (const word of words) {
                    expanded.push(word);
                    if (word.endsWith('s') && word.length > 2) expanded.push(word.slice(0, -1));
                    if (!word.endsWith('s') && word.length > 2) expanded.push(word + 's');
                }
                return [...new Set(expanded)];
            }

            function productMatches(product, tokens) {
                const name = (product.name || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                const description = (product.description || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                const category = (product.category || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                
                for (const token of tokens) {
                    if (name.includes(token) || description.includes(token) || category.includes(token)) return true;
                }
                return false;
            }

            function calculateRelevance(product, tokens) {
                const name = (product.name || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                let score = 0;
                for (const token of tokens) {
                    if (name === token) score += 100;
                    else if (name.startsWith(token)) score += 70;
                    else if (name.includes(token)) score += 50;
                }
                return score;
            }

            function searchProducts(query) {
                if (!query.trim()) return [];
                const tokens = tokenizeQuery(query);
                if (tokens.length === 0) return [];
                
                const matched = allProducts.filter(product => productMatches(product, tokens));
                matched.sort((a, b) => calculateRelevance(b, tokens) - calculateRelevance(a, tokens));
                return matched;
            }

            function startCarousel(productId, images, containerId) {
                if (carouselIntervals[productId]) clearInterval(carouselIntervals[productId]);
                if (!images || images.length <= 1) return;
                
                let currentIndex = 0;
                const slides = document.querySelectorAll(`#${containerId} .carousel-slide-img`);
                if (slides.length === 0) return;
                
                function showSlide(index) {
                    slides.forEach((slide, i) => slide.classList.toggle('active', i === index));
                }
                
                const interval = setInterval(() => {
                    currentIndex = (currentIndex + 1) % images.length;
                    showSlide(currentIndex);
                }, 3500);
                carouselIntervals[productId] = interval;
            }

            function setupCarouselControls(productId, images, containerId) {
                const prevBtn = document.getElementById(`prev-${productId}`);
                const nextBtn = document.getElementById(`next-${productId}`);
                const slides = document.querySelectorAll(`#${containerId} .carousel-slide-img`);
                if (!prevBtn || !nextBtn || slides.length === 0) return;
                
                let currentIndex = 0;
                slides.forEach((slide, i) => { if (slide.classList.contains('active')) currentIndex = i; });
                
                function showSlide(index) {
                    if (index < 0) index = slides.length - 1;
                    if (index >= slides.length) index = 0;
                    slides.forEach((slide, i) => slide.classList.toggle('active', i === index));
                    currentIndex = index;
                    if (carouselIntervals[productId]) {
                        clearInterval(carouselIntervals[productId]);
                        startCarousel(productId, images, containerId);
                    }
                }
                
                prevBtn.addEventListener('click', (e) => { e.stopPropagation(); showSlide(currentIndex - 1); });
                nextBtn.addEventListener('click', (e) => { e.stopPropagation(); showSlide(currentIndex + 1); });
            }

            function renderResults(products, query) {
                const container = document.getElementById('productsList');
                const resultCountSpan = document.getElementById('resultCount');
                
                if (!container) return;
                
                for (const id in carouselIntervals) clearInterval(carouselIntervals[id]);
                carouselIntervals = {};
                
                if (products.length === 0) {
                    container.innerHTML = `<div class="empty-state"><i class="fas fa-search"></i><p>Aucun produit trouvé pour "${escapeHtml(query)}"</p></div>`;
                    resultCountSpan.textContent = '0';
                    return;
                }
                
                resultCountSpan.textContent = products.length;
                
                container.innerHTML = products.map((product, index) => {
                    const images = (product.images || []).filter(Boolean);
                    const hasMultiple = images.length > 1;
                    const uniqueId = `carousel-${product.id}`;
                    const marketName = getMarketName(product.user_id);
                    
                    let imagesHtml = '';
                    if (images.length > 0) {
                        imagesHtml = `
                            <div class="carousel-images" id="${uniqueId}">
                                ${images.map((img, idx) => `<img src="${escapeHtml(img)}" class="carousel-slide-img ${idx === 0 ? 'active' : ''}" alt="${escapeHtml(product.name)}">`).join('')}
                                ${hasMultiple ? `<button class="carousel-nav prev" id="prev-${product.id}"><i class="fas fa-chevron-left"></i></button><button class="carousel-nav next" id="next-${product.id}"><i class="fas fa-chevron-right"></i></button>` : ''}
                            </div>
                        `;
                    } else {
                        imagesHtml = `<div class="image-placeholder"><i class="fas fa-image"></i></div>`;
                    }
                    
                    return `
                        <div class="product-card" data-id="${product.id}" style="animation-delay: ${index * 0.02}s">
                            <div class="product-image-col">
                                <div class="image-carousel">${imagesHtml}</div>
                            </div>
                            <div class="product-info-col">
                                <div class="product-name">${escapeHtml(product.name)}</div>
                                <div class="product-price">${formatPrice(product.price)} FCFA</div>
                                <div class="product-category"><i class="fas fa-store"></i> ${escapeHtml(marketName)}</div>
                            </div>
                        </div>
                    `;
                }).join('');
                
                products.forEach(product => {
                    const images = (product.images || []).filter(Boolean);
                    if (images.length > 1) {
                        const uniqueId = `carousel-${product.id}`;
                        setTimeout(() => {
                            startCarousel(product.id, images, uniqueId);
                            setupCarouselControls(product.id, images, uniqueId);
                        }, 100);
                    }
                });
                
                document.querySelectorAll('.product-card').forEach(card => {
                    const productId = card.getAttribute('data-id');
                    
                    // TOUCHER MOBILE INSTANTANÉ (sans e.preventDefault())
                    card.addEventListener('touchstart', () => {
                        recordCardClick(productId, 'touch');
                    });
                    
                    // CLIC RÉEL
                    card.addEventListener('click', async (e) => {
                        if (e.target.closest('.carousel-nav')) return;
                        card.classList.add('click-animation');
                        setTimeout(() => card.classList.remove('click-animation'), 300);
                        if (productId) {
                            await recordCardClick(productId, 'card');
                            window.location.href = `viewproduct.html?id=${productId}`;
                        }
                    });
                });
            }

            function showInitial() {
                initialState.style.display = 'flex';
                loadingState.style.display = 'none';
                resultsContainer.style.display = 'none';
            }

            function showLoading() {
                initialState.style.display = 'none';
                loadingState.style.display = 'flex';
                resultsContainer.style.display = 'none';
            }

            function showResults(products, query) {
                initialState.style.display = 'none';
                loadingState.style.display = 'none';
                resultsContainer.style.display = 'block';
                renderResults(products, query);
            }

            async function performSearch(forcedQuery = null) {
                const query = forcedQuery !== null ? forcedQuery : searchInput.value.trim();
                if (!query) { showInitial(); return; }
                
                addToHistory(query);
                showLoading();
                
                setTimeout(() => {
                    const results = searchProducts(query);
                    showResults(results, query);
                }, 500);
            }

            async function init() {
                await loadProducts();
                await loadMarkets();
                loadHistory();
                
                searchBtn.addEventListener('click', () => performSearch());
                searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(); });
            }
            
            init();
        })();
    </script>
</body>
</html>
