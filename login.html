<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Connexion - Megane Market</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #ffffff;
            color: #1a2a3a;
            min-height: 100vh;
            padding: 20px;
        }

        .page {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Header */
        .logo-header {
            text-align: center;
            margin-bottom: 32px;
            padding: 20px 0;
        }

        .logo-header img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 12px;
        }

        .logo-header h1 {
            font-size: 1.5rem;
            color: #4ade80;
            font-weight: 700;
        }

        .logo-header p {
            font-size: 0.85rem;
            color: #8a9aaa;
        }

        /* Onglets */
        .tab-container {
            display: flex;
            gap: 8px;
            background: #f0f2f5;
            padding: 4px;
            border-radius: 50px;
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            border-radius: 50px;
            color: #8a9aaa;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: #4ade80;
            color: white;
        }

        /* Formulaires */
        .form-card {
            background: white;
            border: 1px solid #e8ecf0;
            border-radius: 24px;
            padding: 28px 24px;
            display: none;
        }

        .form-card.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-card h2 {
            font-size: 1.3rem;
            margin-bottom: 24px;
            color: #1a2a3a;
            text-align: center;
        }

        /* Inputs */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #8a9aaa;
            font-size: 1rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: #fafbfc;
            border: 1px solid #d0d5dd;
            border-radius: 30px;
            color: #1a2a3a;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .input-group input:focus {
            border-color: #4ade80;
            box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.1);
        }

        .input-group input::placeholder {
            color: #b0b8c5;
        }

        /* Toggle password */
        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #8a9aaa;
            cursor: pointer;
            font-size: 1rem;
        }

        /* Boutons */
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #4ade80;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-primary:hover {
            background: #22c55e;
            transform: translateY(-2px);
        }

        .form-footer {
            text-align: right;
            margin-bottom: 20px;
        }

        .forgot-link {
            color: #4ade80;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #8a9aaa;
            text-decoration: none;
            font-size: 0.85rem;
        }

        .back-link:hover {
            color: #4ade80;
        }

        /* Step navigation */
        .step-nav {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .step-btn {
            flex: 1;
            padding: 12px;
            background: #f0f2f5;
            border: 1px solid #d0d5dd;
            border-radius: 40px;
            color: #1a2a3a;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .step-btn.next {
            background: #4ade80;
            border-color: #4ade80;
            color: white;
        }

        .step-btn.next:hover {
            background: #22c55e;
        }

        .step-btn.prev:hover {
            background: #e8ecf0;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
        }

        .strength-box {
            font-size: 0.7rem;
            margin-top: -12px;
            margin-bottom: 12px;
            padding-left: 12px;
            color: #ffaa44;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1a2a3a;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.85rem;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: #4ade80;
            color: #1a2a3a;
        }

        .toast.error {
            background: #ff4d4d;
        }

        /* Modal loading */
        .modal-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1100;
        }

        .modal-card {
            background: white;
            border-radius: 28px;
            padding: 32px;
            text-align: center;
            border: 1px solid #e8ecf0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e8ecf0;
            border-top-color: #4ade80;
            border-radius: 50%;
            margin: 0 auto 16px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            body {
                padding: 16px;
            }
            .form-card {
                padding: 20px;
            }
            .logo-header h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

<div class="page">
    <div class="logo-header">
        <img src="assets/logo.png" alt="Megane Market" onerror="this.src='https://placehold.co/60x60?text=MM'">
        <h1>Megane Market</h1>
        <p>Votre marché de confiance</p>
    </div>

    <div class="tab-container">
        <button class="tab-btn active" data-tab="login">Connexion</button>
        <button class="tab-btn" data-tab="register">Inscription</button>
    </div>

    <!-- FORMULAIRE CONNEXION -->
    <div id="loginForm" class="form-card active">
        <h2>Connexion</h2>
        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="loginEmail" placeholder="Email">
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="loginPassword" placeholder="Mot de passe">
            <button type="button" class="toggle-password" data-target="loginPassword">
                <i class="fa-regular fa-eye"></i>
            </button>
        </div>
        <div class="form-footer">
            <a href="#" id="forgotPasswordLink" class="forgot-link">Mot de passe oublié ?</a>
        </div>
        <button id="doLoginBtn" class="btn-primary">Se connecter</button>
    </div>

    <!-- FORMULAIRE INSCRIPTION (3 étapes) -->
    <div id="registerForm" class="form-card">
        <div id="step1" class="step active">
            <h2>Email</h2>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="regEmail" placeholder="Votre email">
            </div>
        </div>
        <div id="step2" class="step">
            <h2>Mot de passe</h2>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="regPassword" placeholder="Mot de passe">
                <button type="button" class="toggle-password" data-target="regPassword">
                    <i class="fa-regular fa-eye"></i>
                </button>
            </div>
            <div class="input-group">
                <i class="fas fa-check-circle"></i>
                <input type="password" id="regConfirmPassword" placeholder="Confirmer">
                <button type="button" class="toggle-password" data-target="regConfirmPassword">
                    <i class="fa-regular fa-eye"></i>
                </button>
            </div>
            <div id="passwordStrength" class="strength-box"></div>
        </div>
        <div id="step3" class="step">
            <h2>Nom complet</h2>
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="regFullName" placeholder="Votre nom complet">
            </div>
        </div>
        <div class="step-nav">
            <button id="prevBtn" class="step-btn prev">Précédent</button>
            <button id="nextBtn" class="step-btn next">Suivant</button>
        </div>
    </div>

    <!-- FORMULAIRE MOT DE PASSE OUBLIÉ -->
    <div id="forgotForm" class="form-card">
        <h2>Réinitialisation</h2>
        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="forgotEmail" placeholder="Votre email">
        </div>
        <button id="resetPasswordBtn" class="btn-primary">Envoyer</button>
        <a href="#" id="backToLoginLink" class="back-link">Retour à la connexion</a>
    </div>
</div>

<div id="loadingModal" class="modal-loading" style="display: none;">
    <div class="modal-card">
        <div class="spinner"></div>
        <p id="modalStatus">Chargement...</p>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    (function() {
        const SUPABASE_URL = 'https://emcsigvlopntwbfkkjkh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtY3NpZ3Zsb3BudHdiZmtramtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4ODE5MTgsImV4cCI6MjA5NDQ1NzkxOH0.YwYoV-azL3WEFtHoh4yoF7xTLrOwZILKCzJrGPsCs6I';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentStep = 1;
        let userEmail = '';
        let userPassword = '';
        let userFullName = '';

        // DOM elements
        const loginTab = document.querySelector('[data-tab="login"]');
        const registerTab = document.querySelector('[data-tab="register"]');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const forgotForm = document.getElementById('forgotForm');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const loadingModal = document.getElementById('loadingModal');
        const toastEl = document.getElementById('toast');

        function showToast(message, type = 'info') {
            toastEl.textContent = message;
            toastEl.className = `toast ${type} show`;
            setTimeout(() => toastEl.classList.remove('show'), 3000);
        }

        function showLoading(msg = 'Chargement...') {
            document.getElementById('modalStatus').textContent = msg;
            loadingModal.style.display = 'flex';
        }

        function hideLoading() {
            loadingModal.style.display = 'none';
        }

        function switchTab(tab) {
            if (tab === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                forgotForm.classList.remove('active');
                resetRegistration();
            } else {
                loginTab.classList.remove('active');
                registerTab.classList.add('active');
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
                forgotForm.classList.remove('active');
                resetRegistration();
            }
        }

        function showStep(step) {
            for (let i = 1; i <= 3; i++) {
                const el = document.getElementById(`step${i}`);
                if (el) el.classList.toggle('active', i === step);
            }
            
            if (prevBtn) prevBtn.style.display = step > 1 ? 'block' : 'none';
            if (nextBtn) nextBtn.textContent = step === 3 ? 'Créer' : 'Suivant';
        }

        function checkPasswordStrength(password) {
            const hasMinLength = password.length >= 6;
            const strengthDiv = document.getElementById('passwordStrength');
            
            if (strengthDiv && password.length > 0) {
                if (!hasMinLength) {
                    strengthDiv.innerHTML = '❌ Minimum 6 caractères';
                } else {
                    strengthDiv.innerHTML = '✅ Mot de passe valide';
                }
            } else if (strengthDiv) {
                strengthDiv.innerHTML = '';
            }
            return hasMinLength;
        }

        function nextStep() {
            if (currentStep === 1) {
                const email = document.getElementById('regEmail').value;
                if (!email || !email.includes('@')) {
                    showToast('Email invalide', 'error');
                    return;
                }
                userEmail = email;
                showToast('Email valide', 'success');
            }
            else if (currentStep === 2) {
                const pwd = document.getElementById('regPassword').value;
                const confirm = document.getElementById('regConfirmPassword').value;
                
                if (!checkPasswordStrength(pwd)) {
                    showToast('Mot de passe trop faible (6+ caractères)', 'error');
                    return;
                }
                if (pwd !== confirm) {
                    showToast('Les mots de passe ne correspondent pas', 'error');
                    return;
                }
                userPassword = pwd;
                showToast('Mot de passe valide', 'success');
            }
            else if (currentStep === 3) {
                const fullName = document.getElementById('regFullName').value;
                if (!fullName.trim()) {
                    showToast('Nom complet requis', 'error');
                    return;
                }
                userFullName = fullName;
                createAccount();
                return;
            }
            
            currentStep++;
            showStep(currentStep);
        }

        function prevStep() {
            if (currentStep > 1) {
                currentStep--;
                showStep(currentStep);
            }
        }

        function resetRegistration() {
            currentStep = 1;
            userEmail = '';
            userPassword = '';
            userFullName = '';
            document.getElementById('regEmail').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regConfirmPassword').value = '';
            document.getElementById('regFullName').value = '';
            document.getElementById('passwordStrength').innerHTML = '';
            showStep(1);
        }

        async function createAccount() {
            showLoading('Création du compte...');
            
            try {
                const { data, error } = await supabase.auth.signUp({
                    email: userEmail,
                    password: userPassword,
                    options: {
                        data: { full_name: userFullName }
                    }
                });
                
                if (error) throw error;
                
                if (data.user) {
                    // Créer le profil dans buyers
                    const { error: buyerError } = await supabase
                        .from('buyers')
                        .insert({
                            id: data.user.id,
                            email: userEmail,
                            full_name: userFullName,
                            created_at: new Date().toISOString()
                        });
                    
                    if (buyerError) console.error('Erreur création profil:', buyerError);
                }
                
                showToast('✅ Compte créé avec succès !', 'success');
                
                setTimeout(() => {
                    hideLoading();
                    window.location.href = 'index.html';
                }, 1500);
                
            } catch (error) {
                hideLoading();
                showToast(`❌ Erreur: ${error.message}`, 'error');
            }
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showToast('Email et mot de passe requis', 'error');
                return;
            }
            
            showLoading('Connexion...');
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                
                if (data.user) {
                    showToast('✅ Connexion réussie !', 'success');
                    setTimeout(() => {
                        hideLoading();
                        window.location.href = 'index.html';
                    }, 1000);
                }
            } catch (error) {
                hideLoading();
                showToast('❌ Email ou mot de passe incorrect', 'error');
            }
        }

        async function resetPassword() {
            const email = document.getElementById('forgotEmail').value;
            if (!email || !email.includes('@')) {
                showToast('Email valide requis', 'error');
                return;
            }
            
            showLoading('Envoi...');
            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email);
                if (error) throw error;
                showToast('✅ Lien envoyé ! Vérifiez votre boîte mail', 'success');
                setTimeout(() => {
                    hideLoading();
                    forgotForm.classList.remove('active');
                    loginForm.classList.add('active');
                }, 2000);
            } catch (error) {
                hideLoading();
                showToast(`❌ Erreur: ${error.message}`, 'error');
            }
        }

        function initPasswordToggles() {
            document.querySelectorAll('.toggle-password').forEach(btn => {
                btn.addEventListener('click', () => {
                    const target = document.getElementById(btn.getAttribute('data-target'));
                    const icon = btn.querySelector('i');
                    if (target.type === 'password') {
                        target.type = 'text';
                        icon.classList.remove('fa-eye');
                        icon.classList.add('fa-eye-slash');
                    } else {
                        target.type = 'password';
                        icon.classList.remove('fa-eye-slash');
                        icon.classList.add('fa-eye');
                    }
                });
            });
        }

        function initEventListeners() {
            loginTab.addEventListener('click', () => switchTab('login'));
            registerTab.addEventListener('click', () => switchTab('register'));
            prevBtn.addEventListener('click', prevStep);
            nextBtn.addEventListener('click', nextStep);
            document.getElementById('doLoginBtn').addEventListener('click', login);
            document.getElementById('resetPasswordBtn').addEventListener('click', resetPassword);
            
            document.getElementById('forgotPasswordLink').addEventListener('click', (e) => {
                e.preventDefault();
                loginForm.classList.remove('active');
                forgotForm.classList.add('active');
            });
            
            document.getElementById('backToLoginLink').addEventListener('click', (e) => {
                e.preventDefault();
                forgotForm.classList.remove('active');
                loginForm.classList.add('active');
            });
        }

        function init() {
            initPasswordToggles();
            initEventListeners();
        }
        
        init();
    })();
</script>
</body>
</html>
