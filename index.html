<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Supervision - Megane Market</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Styles additionnels pour le header */
        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .email-btn {
            background: #1a2a3a;
            border: 1px solid #2a3a4a;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #eef2ff;
            transition: all 0.2s;
            text-decoration: none;
        }
        .email-btn:hover {
            background: #4ade80;
            color: white;
            border-color: #4ade80;
            transform: scale(1.05);
        }
        .refresh-btn {
            background: #1a2a3a;
            border: 1px solid #2a3a4a;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #eef2ff;
            transition: all 0.2s;
        }
        .refresh-btn:hover {
            background: #5a9eff;
            color: white;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="globalSearch" placeholder="Rechercher...">
        </div>
        <div class="header-actions">
            <a href="envoi-email.html" class="email-btn" title="Envoyer un e-mail">
                <i class="fas fa-envelope"></i>
            </a>
            <button id="refreshBtn" class="refresh-btn" title="Rafraîchir">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </header>

    <div class="tabs-container">
        <button class="tab-btn active" data-tab="sellers">
            <i class="fas fa-store"></i> Vendeurs
            <span id="sellersBadge" class="tab-badge">0</span>
        </button>
        <button class="tab-btn" data-tab="clients">
            <i class="fas fa-users"></i> Clients
            <span id="clientsBadge" class="tab-badge">0</span>
        </button>
        <button class="tab-btn" data-tab="products">
            <i class="fas fa-boxes"></i> Produits
            <span id="productsBadge" class="tab-badge">0</span>
        </button>
    </div>

    <main id="tabContent" class="tab-content"></main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
